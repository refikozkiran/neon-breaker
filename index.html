<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Neon Breaker — Refo Games</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --border: #1e1e32;
    --neon-blue: #4fc3f7;
    --neon-pink: #f06292;
    --neon-yellow: #ffd54f;
    --neon-green: #69f0ae;
    --neon-purple: #ce93d8;
    --text: #e8e8f0;
    --text-dim: #6b6b8a;
    --glow-blue: 0 0 10px #4fc3f7, 0 0 20px #4fc3f780;
    --glow-pink: 0 0 10px #f06292, 0 0 20px #f0629280;
    --glow-green: 0 0 10px #69f0ae, 0 0 20px #69f0ae80;
  }

  html {
    height: 100%;
    overscroll-behavior: none;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100dvh;
    overscroll-behavior: none;
    user-select: none;
    -webkit-user-select: none;
  }

  /* SCREENS */
  .screen { display: none; width: 100%; max-width: 420px; padding: 24px; padding-top: max(24px, env(safe-area-inset-top)); }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* MENU */
  #menuScreen {
    gap: 20px;
    text-align: center;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: max(32px, env(safe-area-inset-bottom));
  }

  .logo {
    font-size: 42px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
    color: var(--text);
  }
  .logo span {
    color: var(--neon-blue);
    text-shadow: var(--glow-blue);
  }

  .tagline {
    color: var(--text-dim);
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .menu-preview {
    width: 100%;
    height: 180px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .preview-bricks {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 5px;
    padding: 16px;
    width: 100%;
  }

  .preview-brick {
    height: 16px;
    border-radius: 4px;
    opacity: 0.9;
  }

  .btn-primary {
    background: var(--neon-blue);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 16px 48px;
    font-size: 18px;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: var(--glow-blue);
    transition: transform 0.1s, box-shadow 0.2s;
    width: 100%;
  }

  .btn-primary:active { transform: scale(0.97); }

  .btn-secondary {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 32px;
    font-size: 14px;
    cursor: pointer;
    width: 100%;
    transition: color 0.2s, border-color 0.2s;
  }
  .btn-secondary:hover { color: var(--text); border-color: var(--text-dim); }

  .stats-row {
    display: flex;
    gap: 16px;
    width: 100%;
  }

  .stat-box {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    text-align: center;
  }

  .stat-box .val {
    font-size: 22px;
    font-weight: 800;
    color: var(--neon-yellow);
  }

  .stat-box .lbl {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  /* GAME */
  #gameScreen {
    padding: 0;
    flex-direction: column;
    height: 100dvh;
    max-height: 100dvh;
    max-width: 100vw;
    overflow: hidden;
    overscroll-behavior: none;
    justify-content: flex-start;
  }

  .hud {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px 8px;
    width: 100%;
    gap: 8px;
  }

  /* Sol: ev butonu */
  .hud-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 16px;
    color: var(--text-dim);
    transition: background 0.15s;
  }
  .hud-btn:active { background: rgba(255,255,255,0.12); }

  /* Orta: skor + level pill */
  .hud-center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .hud-score {
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .hud-divider {
    width: 1px;
    height: 18px;
    background: rgba(255,255,255,0.15);
    border-radius: 1px;
  }

  .hud-level {
    font-size: 12px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    line-height: 1;
  }

  .hud-level span {
    color: var(--neon-yellow);
    font-weight: 800;
  }

  /* Sağ: canlar + pause */
  .hud-right {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .hud-lives {
    display: flex;
    gap: 4px;
    align-items: center;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 5px 10px;
  }

  .life-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--neon-pink);
    box-shadow: 0 0 6px var(--neon-pink);
    transition: all 0.3s;
  }

  .life-dot.lost {
    background: rgba(255,255,255,0.12);
    box-shadow: none;
  }

  /* Modern pause button — two vertical bars */
  .hud-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
    padding: 0;
  }
  .hud-btn:active { background: rgba(255,255,255,0.14); }

  .hud-btn svg {
    width: 14px;
    height: 14px;
    fill: rgba(255,255,255,0.55);
  }

  #gameCanvas {
    display: block;
    touch-action: none;
    overscroll-behavior: none;
  }

  /* OVERLAYS */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,18,0.92);
    backdrop-filter: blur(8px);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 20px;
    text-align: center;
  }
  .overlay.active { display: flex; }

  .overlay-title {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: -1px;
  }

  .overlay-title.win { color: var(--neon-green); text-shadow: var(--glow-green); }
  .overlay-title.lose { color: var(--neon-pink); text-shadow: var(--glow-pink); }
  .overlay-title.pause { color: var(--neon-blue); text-shadow: var(--glow-blue); }

  .score-display {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 40px;
    gap: 4px;
    width: 100%;
    max-width: 280px;
  }

  .score-display .big { font-size: 48px; font-weight: 900; color: var(--neon-yellow); }
  .score-display .sub { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
  .score-display .best { font-size: 14px; color: var(--text-dim); margin-top: 8px; }
  .score-display .best span { color: var(--neon-yellow); font-weight: 700; }

  .new-record {
    font-size: 13px;
    color: var(--neon-yellow);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    animation: pulse 1s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .overlay-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 280px; }

  /* POWER-UP LEGEND */
  .powerup-legend {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    font-size: 11px;
    color: var(--text-dim);
  }

  .powerup-legend span { display: flex; align-items: center; gap: 4px; }

  /* COMBO */
  #comboDisplay {
    position: fixed;
    top: 68px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.35s;
  }

  #comboDisplay .combo-label {
    font-size: 28px;
    font-weight: 900;
    color: var(--neon-yellow);
    text-shadow: 0 0 16px #ffd54f88;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  #comboDisplay .combo-pts {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    opacity: 0.75;
    letter-spacing: 1px;
  }

  /* floating score popup */
  .score-pop {
    position: fixed;
    pointer-events: none;
    z-index: 60;
    font-size: 18px;
    font-weight: 900;
    color: var(--neon-yellow);
    text-shadow: 0 0 10px #ffd54f;
    animation: floatUp 0.9s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    60%  { opacity: 1; transform: translateY(-40px) scale(1.1); }
    100% { opacity: 0; transform: translateY(-70px) scale(0.9); }
  }

  /* by Refo */
  .by-refo {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  .by-refo a { color: var(--neon-blue); text-decoration: none; }

  /* LEVEL MAP */
  #levelMap {
    width: 100%;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 4px 0 8px;
  }

  .level-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.2s;
    position: relative;
    overflow: hidden;
  }

  .level-card:active { transform: scale(0.95); }

  .level-card.unlocked { border-color: #2a2a44; }
  .level-card.current { border-color: var(--neon-green); box-shadow: 0 0 12px #69f0ae40; }
  .level-card.completed { border-color: #2a2a44; }
  .level-card.locked { opacity: 0.4; cursor: default; }

  .level-card .lc-num {
    font-size: 22px;
    font-weight: 900;
    color: var(--text);
    line-height: 1;
  }
  .level-card.current .lc-num { color: var(--neon-green); text-shadow: var(--glow-green); }
  .level-card.completed .lc-num { color: var(--neon-blue); }

  .level-card .lc-label {
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .level-card .lc-score {
    font-size: 11px;
    font-weight: 700;
    color: var(--neon-yellow);
    margin-top: 6px;
    min-height: 14px;
  }

  .level-card .lc-stars {
    font-size: 12px;
    margin-top: 4px;
    min-height: 16px;
    letter-spacing: 1px;
  }

  .level-card .lc-lock {
    font-size: 18px;
    margin-top: 4px;
    color: var(--text-dim);
  }

  /* CUSTOM CONFIRM MODAL */
  #confirmModal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  #confirmModal.active { display: flex; }

  #confirmModal .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(10,10,18,0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  #confirmModal .modal-card {
    position: relative;
    background: linear-gradient(145deg, #16162a, #0e0e1c);
    border: 1px solid rgba(79,195,247,0.25);
    border-radius: 24px;
    padding: 32px 24px 24px;
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    box-shadow: 0 0 40px rgba(79,195,247,0.12), 0 20px 60px rgba(0,0,0,0.6);
    animation: modalIn 0.25s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.85) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  #confirmModal .modal-icon {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: rgba(79,195,247,0.1);
    border: 1px solid rgba(79,195,247,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px rgba(79,195,247,0.2);
  }

  #confirmModal .modal-icon svg {
    width: 26px;
    height: 26px;
    fill: var(--neon-blue);
    filter: drop-shadow(0 0 6px var(--neon-blue));
  }

  #confirmModal .modal-title {
    font-size: 20px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.3px;
    text-align: center;
  }

  #confirmModal .modal-body {
    font-size: 14px;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.55;
    padding: 0 4px;
  }

  #confirmModal .modal-save-note {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(105,240,174,0.08);
    border: 1px solid rgba(105,240,174,0.2);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--neon-green);
    width: 100%;
  }

  #confirmModal .modal-save-note svg {
    width: 14px;
    height: 14px;
    fill: var(--neon-green);
    flex-shrink: 0;
  }

  #confirmModal .modal-actions {
    display: flex;
    gap: 10px;
    width: 100%;
    margin-top: 4px;
  }

  #confirmModal .btn-cancel {
    flex: 1;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 14px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    color: var(--text-dim);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  #confirmModal .btn-cancel:active { background: rgba(255,255,255,0.06); color: var(--text); }

  #confirmModal .btn-confirm {
    flex: 1;
    background: var(--neon-blue);
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-size: 15px;
    font-weight: 800;
    color: #000;
    cursor: pointer;
    box-shadow: 0 0 16px rgba(79,195,247,0.45);
    transition: transform 0.1s, box-shadow 0.15s;
  }
  #confirmModal .btn-confirm:active { transform: scale(0.96); box-shadow: 0 0 8px rgba(79,195,247,0.3); }
</style>
</head>
<body>

<!-- MENU -->
<div id="menuScreen" class="screen active">
  <div class="logo">NEON<br><span>BREAKER</span></div>
  <div class="tagline" id="tagline">Tuğlaları kır · Komboyu yükselt</div>
  <div id="levelMap"></div>
  <div class="by-refo">by <a href="https://refikozkiran.github.io/refo-games">Refo Games</a></div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen">
  <div class="hud">
    <button class="hud-btn" id="btnHome">
      <svg viewBox="0 0 20 20"><path d="M10 2L2 9h2v9h5v-5h2v5h5V9h2L10 2z"/></svg>
    </button>
    <div class="hud-center">
      <div class="hud-score" id="scoreDisplay">0</div>
      <div class="hud-divider"></div>
      <div class="hud-level">LVL <span id="levelDisplay">1</span></div>
    </div>
    <div class="hud-right">
      <div class="hud-lives" id="livesDisplay"></div>
      <button class="hud-btn" id="btnPause">
        <svg viewBox="0 0 20 20"><rect x="4" y="3" width="4" height="14" rx="1.5"/><rect x="12" y="3" width="4" height="14" rx="1.5"/></svg>
      </button>
    </div>
  </div>
  <canvas id="gameCanvas"></canvas>
</div>

<!-- PAUSE OVERLAY -->
<div class="overlay" id="pauseOverlay">
  <div class="overlay-title pause" id="pauseTitle">DURAKLATILDI</div>
  <div class="overlay-btns">
    <button class="btn-primary" id="btnResume">▶ DEVAM ET</button>
    <button class="btn-secondary" id="btnMenuFromPause">🏠 ANA MENÜ</button>
  </div>
</div>

<!-- WIN OVERLAY -->
<div class="overlay" id="winOverlay">
  <div class="overlay-title win" id="winTitle">SEVİYE TAMAM! 🎉</div>
  <div class="score-display">
    <div class="sub" id="winScoreLbl">SKOR</div>
    <div class="big" id="winScore">0</div>
    <div class="best" id="winBestLbl">En İyi: <span id="winBest">0</span></div>
  </div>
  <div id="newRecordWin" class="new-record" style="display:none">⭐ YENİ REKOR!</div>
  <div class="overlay-btns">
    <button class="btn-primary" id="btnNextLevel">SONRAKI SEVİYE ▶</button>
    <button class="btn-secondary" id="btnMenuFromWin">MENÜ</button>
  </div>
</div>

<!-- GAME OVER OVERLAY -->
<div class="overlay" id="gameOverOverlay">
  <div class="overlay-title lose" id="gameOverTitle">OYUN BİTTİ</div>
  <div class="score-display">
    <div class="sub" id="goScoreLbl">SKOR</div>
    <div class="big" id="goScore">0</div>
    <div class="best" id="goBestLbl">En İyi: <span id="goBest">0</span></div>
  </div>
  <div id="newRecordGO" class="new-record" style="display:none">⭐ YENİ REKOR!</div>
  <div class="overlay-btns">
    <button class="btn-primary" id="btnRestart">TEKRAR OYNA</button>
    <button class="btn-secondary" id="btnMenuFromGO">MENÜ</button>
  </div>
</div>

<div id="comboDisplay"><div class="combo-label"></div><div class="combo-pts"></div></div>

<!-- CUSTOM CONFIRM MODAL -->
<div id="confirmModal">
  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="modal-card">
    <div class="modal-icon">
      <svg viewBox="0 0 20 20"><path d="M10 2L2 9h2v9h5v-5h2v5h5V9h2L10 2z"/></svg>
    </div>
    <div class="modal-title" id="modalTitle">Ana Menüye Dön?</div>
    <div class="modal-body" id="modalBody">Mevcut seviyeden çıkılacak. Devam etmek istiyor musunuz?</div>
    <div class="modal-save-note">
      <svg viewBox="0 0 20 20"><path d="M16 4H4a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V6a2 2 0 00-2-2zm-1 9H5v-1h10v1zm0-3H5v-1h10v1zm-3-3H5V6h7v1z"/></svg>
      <span id="modalSaveNote">İlerlemeniz otomatik kaydedildi</span>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modalCancel">İptal</button>
      <button class="btn-confirm" id="modalConfirm">Çıkış</button>
    </div>
  </div>
</div>

<script>
// ============================================================
// LANGUAGE SYSTEM
// ============================================================
const LANGS = {
  tr: {
    tagline: 'Tuğlaları kır · Komboyu yükselt',
    pauseTitle: 'DURAKLATILDI',
    btnResume: '▶ DEVAM ET',
    btnMenuFromPause: '🏠 ANA MENÜ',
    winTitle: 'SEVİYE TAMAM! 🎉',
    scoreLbl: 'SKOR',
    bestLbl: 'En İyi:',
    newRecord: '⭐ YENİ REKOR!',
    btnNextLevel: 'SONRAKI SEVİYE ▶',
    btnMenu: 'MENÜ',
    gameOverTitle: 'OYUN BİTTİ',
    btnRestart: 'TEKRAR OYNA',
    modalTitle: 'Ana Menüye Dön?',
    modalBody: 'Mevcut seviyeden çıkılacak. Devam etmek istiyor musunuz?',
    modalSaveNote: 'İlerlemeniz otomatik kaydedildi',
    modalCancel: 'İptal',
    modalConfirm: 'Çıkış',
    lcContinue: 'DEVAM',
    lcLocked: 'KİLİTLİ',
    lcLevel: 'SEVİYE',
    howTo: '🎮 Nasıl Oynanır?\n\n• Parmağını sola/sağa kaydır — paddeli hareket ettir\n• Ekrana dokun — topu fırlat\n• Tüm tuğlaları kır, can kaybetme!\n\n💎 Güçlendirmeler:\n♥ Ekstra Can\n⬛ Geniş Paddle\n❄ Yavaş Top\n✦ Çok Top\n\n🔥 Arka arkaya kırarsan KOMBO bonusu kazanırsın!',
    launchHint: 'DOKUNARAK FIRLATARAK BAŞLA!',
  },
  en: {

// ============================================================
// PROFESSIONAL AUDIO ENGINE
// Zincir: Oscillator/Noise → Filter → Gain(env) → Compressor → Master
// ============================================================
const SFX = (() => {
  let ac = null;
  let master = null;
  let compressor = null;

  function boot() {
    if (ac) return;
    ac = new (window.AudioContext || window.webkitAudioContext)();

    compressor = ac.createDynamicsCompressor();
    compressor.threshold.value = -18;
    compressor.knee.value = 10;
    compressor.ratio.value = 4;
    compressor.attack.value = 0.003;
    compressor.release.value = 0.15;

    master = ac.createGain();
    master.gain.value = 0.72;
    master.connect(compressor);
    compressor.connect(ac.destination);
  }

  function resume() {
    if (ac && ac.state === 'suspended') ac.resume();
  }

  // ── Noise buffer (cached) ──
  let _noiseBuf = null;
  function getNoiseBuf(dur = 1.0) {
    if (_noiseBuf) return _noiseBuf;
    const len = Math.ceil(ac.sampleRate * dur);
    _noiseBuf = ac.createBuffer(1, len, ac.sampleRate);
    const d = _noiseBuf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    return _noiseBuf;
  }

  // ── Reverb IR (impulse response) ──
  let _reverbNode = null;
  function getReverb() {
    if (_reverbNode) return _reverbNode;
    const len = Math.ceil(ac.sampleRate * 0.6);
    const buf = ac.createBuffer(2, len, ac.sampleRate);
    for (let c = 0; c < 2; c++) {
      const d = buf.getChannelData(c);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.5);
    }
    _reverbNode = ac.createConvolver();
    _reverbNode.buffer = buf;
    _reverbNode.connect(master);
    return _reverbNode;
  }

  // ── Core oscillator voice ──
  function osc({ freq = 440, type = 'sine', gainPeak = 0.25, attack = 0.004, hold = 0, decay = 0.12, release = 0.08,
                  freqEnd = null, detune = 0, filterFreq = null, filterQ = 1, filterType = 'lowpass',
                  reverbSend = 0, dest = master } = {}) {
    try {
      boot(); resume();
      const t = ac.currentTime;
      const o = ac.createOscillator();
      o.type = type;
      o.frequency.setValueAtTime(freq, t);
      if (detune) o.detune.setValueAtTime(detune, t);
      if (freqEnd !== null) o.frequency.exponentialRampToValueAtTime(freqEnd, t + attack + hold + decay + release);

      let node = o;

      if (filterFreq) {
        const f = ac.createBiquadFilter();
        f.type = filterType;
        f.frequency.setValueAtTime(filterFreq, t);
        f.Q.value = filterQ;
        o.connect(f);
        node = f;
      }

      const env = ac.createGain();
      env.gain.setValueAtTime(0.0001, t);
      env.gain.linearRampToValueAtTime(gainPeak, t + attack);
      if (hold > 0) env.gain.setValueAtTime(gainPeak, t + attack + hold);
      env.gain.exponentialRampToValueAtTime(0.0001, t + attack + hold + decay + release);

      node.connect(env);
      env.connect(dest);

      if (reverbSend > 0) {
        const rv = ac.createGain();
        rv.gain.value = reverbSend;
        env.connect(rv);
        rv.connect(getReverb());
      }

      o.start(t);
      o.stop(t + attack + hold + decay + release + 0.05);
    } catch(e) {}
  }

  // ── Noise voice ──
  function noise({ gainPeak = 0.15, attack = 0.002, decay = 0.07, release = 0.04,
                   filterFreq = 4000, filterType = 'bandpass', filterQ = 0.8,
                   reverbSend = 0, dest = master } = {}) {
    try {
      boot(); resume();
      const t = ac.currentTime;
      const src = ac.createBufferSource();
      src.buffer = getNoiseBuf();
      src.loop = true;

      const f = ac.createBiquadFilter();
      f.type = filterType;
      f.frequency.value = filterFreq;
      f.Q.value = filterQ;

      const env = ac.createGain();
      env.gain.setValueAtTime(0.0001, t);
      env.gain.linearRampToValueAtTime(gainPeak, t + attack);
      env.gain.exponentialRampToValueAtTime(0.0001, t + attack + decay + release);

      src.connect(f);
      f.connect(env);
      env.connect(dest);

      if (reverbSend > 0) {
        const rv = ac.createGain();
        rv.gain.value = reverbSend;
        env.connect(rv);
        rv.connect(getReverb());
      }

      src.start(t);
      src.stop(t + attack + decay + release + 0.02);
    } catch(e) {}
  }

  // ─────────────────────────────────────────
  // SOUND EVENTS
  // ─────────────────────────────────────────

  // TOP → TUĞLA: plastik klik + kısa tonal ping
  // Combo arttıkça daha enerji dolup pitch yükseliyor
  function brickHit(combo) {
    const c = Math.min(combo, 16);
    const pitch = 380 + c * 35;
    // Transient klik
    noise({ gainPeak: 0.28, attack: 0.001, decay: 0.018, release: 0.01, filterFreq: 2800 + c * 80, filterType: 'bandpass', filterQ: 1.4 });
    // Tonal ping (FM-like: iki osc)
    osc({ freq: pitch, type: 'triangle', gainPeak: 0.14, attack: 0.001, hold: 0, decay: 0.04, release: 0.05, freqEnd: pitch * 0.7, filterFreq: 6000, filterType: 'lowpass' });
    osc({ freq: pitch * 2.01, type: 'sine', gainPeak: 0.06, attack: 0.001, decay: 0.025, release: 0.02 });
  }

  // TUĞLA YIKILİR: güçlü impact + tonal body + reverb tail
  function brickBreak(combo) {
    const c = Math.min(combo, 16);
    const pitch = 260 + c * 22;
    // Heavy transient
    noise({ gainPeak: 0.45, attack: 0.001, decay: 0.055, release: 0.03, filterFreq: 1200 + c * 40, filterType: 'bandpass', filterQ: 0.7 });
    // Sub thump
    osc({ freq: 80 + c * 3, type: 'sine', gainPeak: 0.3, attack: 0.001, decay: 0.08, release: 0.06, freqEnd: 40 });
    // Tonal snap
    osc({ freq: pitch, type: 'square', gainPeak: 0.12, attack: 0.001, decay: 0.055, release: 0.04, freqEnd: pitch * 0.5, filterFreq: 3000, filterType: 'lowpass', filterQ: 0.5, reverbSend: 0.18 });
  }

  // PADDLE: solid thud, metalik, düşük pitch
  function paddleHit() {
    noise({ gainPeak: 0.22, attack: 0.001, decay: 0.028, release: 0.015, filterFreq: 900, filterType: 'bandpass', filterQ: 1.8 });
    osc({ freq: 145, type: 'sine', gainPeak: 0.28, attack: 0.001, decay: 0.065, release: 0.04, freqEnd: 80 });
    osc({ freq: 290, type: 'triangle', gainPeak: 0.09, attack: 0.001, decay: 0.03, release: 0.02, freqEnd: 180 });
  }

  // DUVAR: daha sert, high-mid klik
  function wallBounce() {
    noise({ gainPeak: 0.18, attack: 0.001, decay: 0.015, release: 0.008, filterFreq: 3800, filterType: 'highpass', filterQ: 0.5 });
    osc({ freq: 520, type: 'triangle', gainPeak: 0.07, attack: 0.001, decay: 0.02, release: 0.015, freqEnd: 340 });
  }

  // CAN KAYBI: dramatic çöküş — inen chromatic glide
  function lifeLost() {
    // Low drone başlangıç
    osc({ freq: 320, type: 'sawtooth', gainPeak: 0.22, attack: 0.02, hold: 0.05, decay: 0.25, release: 0.4, freqEnd: 110,
          filterFreq: 2000, filterType: 'lowpass', filterQ: 2, reverbSend: 0.35 });
    // Descending stabs
    [0, 80, 170, 270].forEach((ms, i) => {
      setTimeout(() => {
        const f = 280 - i * 38;
        osc({ freq: f, type: 'sawtooth', gainPeak: 0.18 - i * 0.03, attack: 0.008, decay: 0.12, release: 0.18, freqEnd: f * 0.55,
              filterFreq: 1800, filterType: 'lowpass', reverbSend: 0.2 });
        noise({ gainPeak: 0.12, attack: 0.001, decay: 0.03, release: 0.015, filterFreq: 800, filterType: 'bandpass', filterQ: 1 });
      }, ms);
    });
  }

  // POWER-UP: her tip için farklı karakter
  function powerupCollect(type) {
    if (type === 'extra-life') {
      // Sıcak arpeji, yükselen
      [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => {
        osc({ freq: f, type: 'sine', gainPeak: 0.2, attack: 0.008, decay: 0.1, release: 0.15, reverbSend: 0.3 });
        osc({ freq: f * 1.5, type: 'sine', gainPeak: 0.06, attack: 0.008, decay: 0.06, release: 0.08 });
      }, i * 75));
    } else if (type === 'wide-paddle') {
      // Güçlü açılım sesi
      osc({ freq: 180, type: 'sawtooth', gainPeak: 0.2, attack: 0.01, decay: 0.18, release: 0.22, freqEnd: 440,
            filterFreq: 3000, filterType: 'lowpass', reverbSend: 0.2 });
      osc({ freq: 360, type: 'square', gainPeak: 0.08, attack: 0.015, decay: 0.12, release: 0.15, freqEnd: 720 });
    } else if (type === 'slow-ball') {
      // Dondurma / yavaşlama etkisi — pitch düşüşü
      osc({ freq: 880, type: 'sine', gainPeak: 0.18, attack: 0.02, hold: 0.05, decay: 0.25, release: 0.3, freqEnd: 330,
            filterFreq: 4000, filterType: 'lowpass', filterQ: 3, reverbSend: 0.4 });
      noise({ gainPeak: 0.08, attack: 0.01, decay: 0.2, release: 0.1, filterFreq: 3000, filterType: 'lowpass', filterQ: 2 });
    } else if (type === 'fire-ball') {
    activePowerups['fire-ball'] = 7; // 7 saniye
    updateHUD();
  } else if (type === 'multi-ball') {
      // Çoğalma — hızlı staccato cluster
      [440, 554, 622, 740, 880].forEach((f, i) => setTimeout(() => {
        osc({ freq: f, type: 'square', gainPeak: 0.13, attack: 0.002, decay: 0.06, release: 0.08,
              filterFreq: 5000, filterType: 'lowpass', reverbSend: 0.15 });
      }, i * 45));
    }
  }

  // SEVİYE TAMAMLANDI: kazanç fanfarı, 4 nota + chord
  function levelWin() {
    const fanfare = [523, 659, 784, 1047];
    fanfare.forEach((f, i) => {
      setTimeout(() => {
        osc({ freq: f, type: 'sine', gainPeak: 0.22, attack: 0.012, hold: 0.04, decay: 0.15, release: 0.25, reverbSend: 0.4 });
        osc({ freq: f * 1.25, type: 'sine', gainPeak: 0.07, attack: 0.012, decay: 0.1, release: 0.2, reverbSend: 0.3 });
      }, i * 120);
    });
    // Final chord
    setTimeout(() => {
      [523, 659, 784, 1047, 1319].forEach(f => {
        osc({ freq: f, type: 'sine', gainPeak: 0.12, attack: 0.02, hold: 0.1, decay: 0.3, release: 0.6, reverbSend: 0.5 });
      });
    }, fanfare.length * 120 + 40);
  }

  // OYUN BİTTİ: derin çöküş
  function gameOver() {
    [440, 349, 294, 220, 165].forEach((f, i) => {
      setTimeout(() => {
        osc({ freq: f, type: 'sawtooth', gainPeak: 0.2 - i * 0.02, attack: 0.01, hold: 0.02, decay: 0.22, release: 0.35,
              freqEnd: f * 0.6, filterFreq: 1600 - i * 120, filterType: 'lowpass', filterQ: 1.5, reverbSend: 0.45 });
        if (i === 4) noise({ gainPeak: 0.2, attack: 0.01, decay: 0.4, release: 0.3, filterFreq: 400, filterType: 'lowpass', filterQ: 0.5, reverbSend: 0.3 });
      }, i * 155);
    });
  }

  // KOMBO: pitch ladder — her hit biraz daha tiz, kristal
  function comboTick(count) {
    if (count < 3) return;
    const f = Math.min(600 + count * 55, 2400);
    osc({ freq: f, type: 'sine', gainPeak: 0.09, attack: 0.001, decay: 0.025, release: 0.04 });
    if (count >= 7) {
      // harmonic overtone
      osc({ freq: f * 1.5, type: 'sine', gainPeak: 0.04, attack: 0.001, decay: 0.02, release: 0.03 });
    }
  }

  // LAUNCH: whoosh sweep
  function launch() {
    noise({ gainPeak: 0.15, attack: 0.005, decay: 0.08, release: 0.06, filterFreq: 800, filterType: 'bandpass', filterQ: 2 });
    osc({ freq: 220, type: 'sine', gainPeak: 0.18, attack: 0.005, decay: 0.08, release: 0.1, freqEnd: 880,
          filterFreq: 4000, filterType: 'lowpass' });
  }

  // UI CLICK: clean high tap
  function uiClick() {
    osc({ freq: 1100, type: 'sine', gainPeak: 0.1, attack: 0.001, decay: 0.025, release: 0.03 });
    noise({ gainPeak: 0.06, attack: 0.001, decay: 0.012, release: 0.008, filterFreq: 6000, filterType: 'highpass', filterQ: 0.5 });
  }

  // BOMBA PATLAMASI: derin boom + metalik crackle + reverb
  function bombExplosion() {
    // Deep sub boom
    osc({ freq: 55, type: 'sine', gainPeak: 0.7, attack: 0.001, hold: 0.02, decay: 0.18, release: 0.35, freqEnd: 22,
          filterFreq: 200, filterType: 'lowpass', filterQ: 0.5, reverbSend: 0.5 });
    // Mid punch
    osc({ freq: 120, type: 'sawtooth', gainPeak: 0.35, attack: 0.001, decay: 0.12, release: 0.2, freqEnd: 45,
          filterFreq: 800, filterType: 'lowpass', filterQ: 1.2, reverbSend: 0.4 });
    // Metalik crackle
    noise({ gainPeak: 0.55, attack: 0.001, decay: 0.09, release: 0.12, filterFreq: 2200, filterType: 'bandpass', filterQ: 0.6, reverbSend: 0.45 });
    // High sizzle
    noise({ gainPeak: 0.2, attack: 0.002, decay: 0.18, release: 0.25, filterFreq: 7000, filterType: 'highpass', filterQ: 0.4, reverbSend: 0.3 });
    // Delayed secondary crack
    setTimeout(() => {
      noise({ gainPeak: 0.3, attack: 0.001, decay: 0.06, release: 0.08, filterFreq: 1800, filterType: 'bandpass', filterQ: 0.8 });
      osc({ freq: 90, type: 'sine', gainPeak: 0.22, attack: 0.001, decay: 0.1, release: 0.15, freqEnd: 30 });
    }, 80);
  }

  return { brickHit, brickBreak, paddleHit, wallBounce, lifeLost, powerupCollect, levelWin, gameOver, comboTick, launch, uiClick, boot, resume, bombExplosion };
})();

// ============================================================
// PROFESSIONAL VISUAL EFFECTS SYSTEM
// ============================================================
const VFX = (() => {
  // ── Screen shake ──
  let shakeAmt = 0;
  let shakeX = 0, shakeY = 0;

  function shake(intensity = 6, decayMs = 220) {
    shakeAmt = Math.max(shakeAmt, intensity);
    const start = performance.now();
    const step = () => {
      const t = (performance.now() - start) / decayMs;
      if (t >= 1) { shakeAmt = 0; shakeX = 0; shakeY = 0; return; }
      const s = shakeAmt * (1 - t);
      shakeX = (Math.random() * 2 - 1) * s;
      shakeY = (Math.random() * 2 - 1) * s;
      requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }

  function applyShake(ctx) {
    if (shakeX !== 0 || shakeY !== 0) ctx.translate(shakeX, shakeY);
  }

  // ── Flash overlay ──
  let flashAlpha = 0;
  let flashColor = '#ffffff';
  function flash(color = '#ffffff', alpha = 0.35, decayMs = 180) {
    flashColor = color;
    flashAlpha = alpha;
    const start = performance.now();
    const step = () => {
      const t = (performance.now() - start) / decayMs;
      if (t >= 1) { flashAlpha = 0; return; }
      flashAlpha = alpha * (1 - t);
      requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }

  function drawFlash(ctx, W, H) {
    if (flashAlpha <= 0) return;
    ctx.save();
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = flashColor;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // ── Shockwave rings ──
  const shockwaves = [];
  function addShockwave(x, y, color = '#ffffff', maxR = 60) {
    shockwaves.push({ x, y, r: 4, maxR, color, alpha: 0.7, width: 3 });
  }

  function updateShockwaves(dt) {
    for (let i = shockwaves.length - 1; i >= 0; i--) {
      const s = shockwaves[i];
      s.r += (s.maxR - s.r) * Math.min(dt * 10, 0.5);
      s.alpha -= dt * 3.5;
      s.width *= 0.88;
      if (s.alpha <= 0) shockwaves.splice(i, 1);
    }
  }

  function drawShockwaves(ctx) {
    // shadowBlur yok — lineWidth ve alpha ile görsel etki
    for (const s of shockwaves) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, s.alpha);
      ctx.strokeStyle = s.color;
      ctx.lineWidth = Math.max(0.5, s.width);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.stroke();
      // İkinci daha ince halka — derinlik hissi, shadow yerine
      ctx.globalAlpha = Math.max(0, s.alpha * 0.35);
      ctx.lineWidth = Math.max(0.2, s.width * 2.2);
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 0.75, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
  }

  // ── Ball trail ──
  const trails = [];
  function addTrail(ball) {
    trails.push({ x: ball.x, y: ball.y, r: ball.r, alpha: 0.55, life: 0.55 });
  }

  function updateTrails(dt) {
    for (let i = trails.length - 1; i >= 0; i--) {
      const t = trails[i];
      t.life -= dt * 5.5;
      t.alpha = t.life;
      t.r *= 0.94;
      if (t.life <= 0) trails.splice(i, 1);
    }
  }

  function drawTrails(ctx) {
    for (const t of trails) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, t.alpha * 0.5);
      ctx.fillStyle = '#f06292';
      ctx.shadowBlur = 12;
      ctx.shadowColor = '#f06292';
      ctx.beginPath();
      ctx.arc(t.x, t.y, Math.max(0.5, t.r), 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // ── Impact sparks (directional, physics-based) ──
  const sparks = [];
  function addSparks(x, y, color, count = 10, dirX = 0, dirY = 0) {
    for (let i = 0; i < count; i++) {
      const spread = Math.PI * 1.1;
      const baseAngle = Math.atan2(dirY, dirX) + Math.PI / 2;
      const angle = baseAngle + (Math.random() - 0.5) * spread;
      const speed = 90 + Math.random() * 180;
      sparks.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 60,
        size: 1.5 + Math.random() * 2.5,
        color,
        life: 0.5 + Math.random() * 0.35,
        maxLife: 0,
        trail: [],
      });
      sparks[sparks.length - 1].maxLife = sparks[sparks.length - 1].life;
    }
  }

  function updateSparks(dt) {
    for (let i = sparks.length - 1; i >= 0; i--) {
      const s = sparks[i];
      s.trail.push({ x: s.x, y: s.y });
      if (s.trail.length > 4) s.trail.shift();
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += 420 * dt; // gravity
      s.vx *= 0.97;
      s.life -= dt;
      if (s.life <= 0) sparks.splice(i, 1);
    }
  }

  function drawSparks(ctx) {
    if (sparks.length === 0) return;
    // Renk gruplarına göre batch — tek shadowBlur set yerine alpha+stroke kullan
    ctx.save();
    ctx.lineCap = 'round';
    for (const s of sparks) {
      const t = s.life / s.maxLife;
      if (t <= 0) continue;
      ctx.globalAlpha = t * 0.85;
      ctx.strokeStyle = s.color;
      ctx.lineWidth = Math.max(0.5, s.size * t);
      if (s.trail.length > 1) {
        ctx.beginPath();
        ctx.moveTo(s.trail[0].x, s.trail[0].y);
        for (let j = 1; j < s.trail.length; j++) ctx.lineTo(s.trail[j].x, s.trail[j].y);
        ctx.lineTo(s.x, s.y);
        ctx.stroke();
      }
    }
    ctx.restore();
  }

  // ── Debris chunks (broken brick pieces) ──
  const debris = [];
  function addDebris(x, y, w, h, color) {
    const count = 3 + Math.floor(Math.random() * 3);
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 60 + Math.random() * 140;
      const size = (Math.min(w, h) * 0.25) + Math.random() * (Math.min(w, h) * 0.2);
      debris.push({
        x: x + w * Math.random(),
        y: y + h * Math.random(),
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 80,
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 8,
        size,
        color,
        life: 0.5 + Math.random() * 0.35,
        maxLife: 0,
      });
      debris[debris.length - 1].maxLife = debris[debris.length - 1].life;
    }
  }

  function updateDebris(dt) {
    for (let i = debris.length - 1; i >= 0; i--) {
      const d = debris[i];
      d.x += d.vx * dt;
      d.y += d.vy * dt;
      d.vy += 480 * dt;
      d.vx *= 0.97;
      d.rot += d.rotV * dt;
      d.life -= dt;
      if (d.life <= 0) debris.splice(i, 1);
    }
  }

  function drawDebris(ctx) {
    if (debris.length === 0) return;
    for (const d of debris) {
      const t = d.life / d.maxLife;
      if (t <= 0) continue;
      ctx.save();
      ctx.globalAlpha = t * 0.8;
      ctx.fillStyle = d.color;
      ctx.translate(d.x, d.y);
      ctx.rotate(d.rot);
      const s = d.size * (0.5 + t * 0.5);
      ctx.fillRect(-s / 2, -s / 2, s, s);
      ctx.restore();
    }
  }

  // ── Glow pulse on paddle ──
  let paddleFlashT = 0;
  function paddleFlash() { paddleFlashT = 1.0; }
  function updatePaddleFlash(dt) { paddleFlashT = Math.max(0, paddleFlashT - dt * 6); }
  function getPaddleGlow() { return paddleFlashT; }

  // ── Reset all transient effect state ──
  // Level değişimlerinde veya menüye dönüşte çağrılır. update(dt), gameState
  // 'playing' değilken hiç çalışmadığından, bu state'ler aksi halde donmuş
  // kalır ve bir sonraki levelde paddle'ın tam beyaz/parlak görünmesine ya da
  // eski shockwave/spark/flash kalıntılarının üst üste binmesine yol açar.
  function reset() {
    shakeAmt = 0; shakeX = 0; shakeY = 0;
    flashAlpha = 0;
    shockwaves.length = 0;
    trails.length = 0;
    sparks.length = 0;
    debris.length = 0;
    paddleFlashT = 0;
  }

  return {
    shake, applyShake,
    flash, drawFlash,
    addShockwave, updateShockwaves, drawShockwaves,
    addTrail, updateTrails, drawTrails,
    addSparks, updateSparks, drawSparks,
    addDebris, updateDebris, drawDebris,
    paddleFlash, updatePaddleFlash, getPaddleGlow,
    reset,
  };
})();

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H;
let gameState = 'menu'; // menu | playing | paused | win | gameover
let animId = null;

// ---- GAME DATA ----
let score = 0;
let level = 1;
let lives = 3;
let combo = 0;
let comboTimer = 0;

// ---- SETTINGS ----
const COLS = 7;
const BRICK_ROWS_BASE = 4;
const PADDLE_H = 12;
const BALL_R = 7;

// ---- COLORS ----
const COLORS = {
  blue:   { fill: '#4fc3f7', glow: '#4fc3f7' },
  red:    { fill: '#f06292', glow: '#f06292' },
  yellow: { fill: '#ffd54f', glow: '#ffd54f' },
  green:  { fill: '#69f0ae', glow: '#69f0ae' },
  purple: { fill: '#ce93d8', glow: '#ce93d8' },
};
const COLOR_KEYS = Object.keys(COLORS);

// Power-up types
const POWERUPS = ['extra-life', 'wide-paddle', 'slow-ball', 'multi-ball'];
const POWERUPS_LATE = ['extra-life', 'wide-paddle', 'slow-ball', 'multi-ball', 'fire-ball'];
const BOMB_CHANCE = 0.055;

// ---- STATE ----
let bricks = [];
let balls = [];
let paddle = {};
let particles = [];
let powerups = [];
let activePowerups = {};
let paddleTarget = 0;
let ballLaunched = false;
let touchX = null;

// ---- RESIZE ----
function resize() {
  const gameScreen = document.getElementById('gameScreen');
  const hud = document.querySelector('.hud');
  const hudH = (hud && hud.getBoundingClientRect().height) || 60;

  // visualViewport, mobil tarayıcılarda adres çubuğu kayarken
  // window.innerHeight'tan daha güvenilir gerçek görünür yüksekliği verir.
  const viewportH = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
  const viewportW = (window.visualViewport && window.visualViewport.width) || window.innerWidth;

  const rectW = gameScreen.getBoundingClientRect().width;
  const newW = rectW > 0 ? rectW : Math.min(viewportW, 420);
  const newH = viewportH - hudH;

  // Geçersiz (0, negatif veya NaN) ölçümler oyun tahtasının ve
  // tuğlaların bozuk/aşırı büyük çizilmesine yol açar — bu durumda
  // eski geçerli boyutu koru ve bir frame sonra tekrar dene.
  if (!(newW > 0) || !(newH > 0)) {
    if (!W || !H) { W = Math.min(viewportW, 420) || 360; H = viewportH - hudH || 600; }
    requestAnimationFrame(resize);
    return;
  }

  W = newW;
  H = newH;
  canvas.width = W;
  canvas.height = H;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  // Paddle ve top, level oynanırken bir resize/adres-çubuğu kayması
  // sonrası eski (artık geçersiz) konumda/ölçüde kalmasın.
  if (paddle && paddle.w) {
    paddle.baseW = W * 0.22;
    if (!activePowerups['wide-paddle']) paddle.w = paddle.baseW;
    paddle.y = H - 55;
    paddle.x = clamp(paddle.x, paddle.w / 2, W - paddle.w / 2);
    paddleTarget = clamp(paddleTarget, paddle.w / 2, W - paddle.w / 2);
  }
}

// ---- BRICK SETUP ----
function getBrickDims() {
  const margin = 10;
  const gap = 5;
  const safeW = (W && W > 0) ? W : 360; // W geçici olarak 0/negatifse güvenli bir varsayılana düş
  const bw = Math.max(4, (safeW - margin * 2 - gap * (COLS - 1)) / COLS);
  const bh = Math.min(24, bw * 0.38);
  return { bw, bh, gap, margin };
}

function createBricks() {
  bricks = [];
  const { bw, bh, gap, margin } = getBrickDims();
  const rows = BRICK_ROWS_BASE + Math.floor(level * 0.8);
  const topOffset = 70;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < COLS; c++) {
      if (level < 3 && Math.random() < 0.08) continue;

      const colorKey = COLOR_KEYS[Math.floor(Math.random() * COLOR_KEYS.length)];
      const hp = r < 2 ? 1 : (Math.random() < 0.2 + level * 0.05 ? 2 : 1);
      const hasPowerup = Math.random() < 0.12;
      const pwPool = level >= 11 ? POWERUPS_LATE : POWERUPS;
      const powerupType = hasPowerup ? pwPool[Math.floor(Math.random() * pwPool.length)] : null;

      bricks.push({
        x: margin + c * (bw + gap),
        y: topOffset + r * (bh + gap),
        w: bw,
        h: bh,
        color: colorKey,
        hp,
        maxHp: hp,
        powerup: powerupType,
        bomb: false,
        alive: true,
        shake: 0,
      });
    }
  }

  // 11. bölüm ve sonrasında tam olarak 1 bomba: powerup'suz tuğlalar arasından rastgele seç
  if (level >= 11) {
    const candidates = bricks.filter(b => !b.powerup);
    if (candidates.length > 0) {
      const chosen = candidates[Math.floor(Math.random() * candidates.length)];
      chosen.bomb = true;
    }
  }
}

// ---- BALL SETUP ----
function createBall(x, y, vx, vy) {
  return { x, y, vx, vy, r: BALL_R };
}

function resetBall() {
  balls = [createBall(W / 2, H - 120, 0, 0)];
  ballLaunched = false;
}

// ---- PADDLE SETUP ----
function resetPaddle() {
  paddle = {
    x: W / 2,
    y: H - 55,
    w: W * 0.22,
    h: PADDLE_H,
    baseW: W * 0.22,
  };
  paddleTarget = W / 2;
}

// ---- INIT LEVEL ----
function initLevel() {
  score = 0; // Her level kendi puanına sıfırdan başlar, önceki levelin skoru taşınmaz
  createBricks();
  resetPaddle();
  resetBall();
  particles = [];
  powerups = [];
  activePowerups = {};
  combo = 0;
  comboTimer = 0;
  VFX.reset();
}

// ---- SAVE / LOAD ----
function saveProgress() {
  localStorage.setItem('neonBreaker_save', JSON.stringify({ level, score, lives }));
}

function loadProgress() {
  try {
    const s = localStorage.getItem('neonBreaker_save');
    return s ? JSON.parse(s) : null;
  } catch { return null; }
}

function clearProgress() {
  localStorage.removeItem('neonBreaker_save');
}

// ---- START GAME ----
function startGame() {
  score = 0;
  level = 1;
  lives = 3;
  clearProgress();
  showScreen('game');
  requestAnimationFrame(() => {
    resize();
    initLevel();
    updateHUD();
    gameState = 'playing';
    startLoop();
  });
}

function continueGame() {
  const save = loadProgress();
  if (!save) return;
  level = save.level;
  lives = 3; // Her levelde her zaman 3 canla başla
  showScreen('game');
  requestAnimationFrame(() => {
    resize();
    initLevel(); // score'u da sıfırlar — her level kendi puanına 0'dan başlar
    updateHUD();
    gameState = 'playing';
    startLoop();
  });
}

// ---- SPEED BASED ON LEVEL ----
function getBallSpeed() {
  return (W * 0.012) + level * (W * 0.0015);
}

// ---- LAUNCH BALL ----
function launchBall() {
  if (ballLaunched) return;
  ballLaunched = true;
  SFX.launch();
  const speed = getBallSpeed();
  const angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.8;
  balls[0].vx = Math.cos(angle) * speed;
  balls[0].vy = Math.sin(angle) * speed;
  // Eğer multi-ball güçlendirmesiyle ek toplar varsa onlara da hız ver
  for (let i = 1; i < balls.length; i++) {
    if (balls[i].vx === 0 && balls[i].vy === 0) {
      const a2 = -Math.PI / 2 + (Math.random() - 0.5) * 1.2;
      balls[i].vx = Math.cos(a2) * speed;
      balls[i].vy = Math.sin(a2) * speed;
    }
  }
}

// ---- UPDATE ----
function update(dt) {
  if (gameState !== 'playing') return;

  // Paddle follow
  const dx = paddleTarget - paddle.x;
  paddle.x += dx * 0.18;
  paddle.x = clamp(paddle.x, paddle.w / 2, W - paddle.w / 2);

  // Ball stuck to paddle
  if (!ballLaunched && balls.length > 0) {
    balls[0].x = paddle.x;
    balls[0].y = paddle.y - paddle.h / 2 - balls[0].r;
  }

  // VFX updates
  VFX.updateShockwaves(dt);
  VFX.updateTrails(dt);
  VFX.updateSparks(dt);
  VFX.updateDebris(dt);
  VFX.updatePaddleFlash(dt);

  // Combo timer
  if (comboTimer > 0) {
    comboTimer -= dt;
    if (comboTimer <= 0) { combo = 0; hideCombo(); }
  }

  // Power-up timers
  for (const key in activePowerups) {
    activePowerups[key] -= dt;
    if (activePowerups[key] <= 0) {
      delete activePowerups[key];
      if (key === 'wide-paddle') paddle.w = paddle.baseW;
      if (key === 'slow-ball') {
        for (const b of balls) {
          if (b._origSpeed) {
            const cur = Math.hypot(b.vx, b.vy);
            if (cur > 0) {
              const ratio = b._origSpeed / cur;
              b.vx *= ratio;
              b.vy *= ratio;
            }
            delete b._origSpeed;
          }
        }
      }
    }
  }

  // Update balls — substep sistemi ile tünelleme önlenir
  let ballsToRemove = [];
  for (let i = 0; i < balls.length; i++) {
    const b = balls[i];
    if (!ballLaunched && i === 0) continue;

    // Topu yarıçapı kadar küçük adımlara böl
    const spd = Math.hypot(b.vx, b.vy);
    const stepSize = Math.max(b.r * 0.9, 1);
    const steps = Math.ceil(spd / stepSize);
    const sx = b.vx / steps;
    const sy = b.vy / steps;

    let ballLost = false;
    let brickHitThisFrame = false;

    for (let s = 0; s < steps; s++) {
      b.x += sx;
      b.y += sy;

      // Wall bounce
      if (b.x - b.r < 0) {
        b.x = b.r; b.vx = Math.abs(b.vx);
        SFX.wallBounce();
        VFX.addSparks(b.x, b.y, '#4fc3f7', 3, -1, 0);
      }
      if (b.x + b.r > W) {
        b.x = W - b.r; b.vx = -Math.abs(b.vx);
        SFX.wallBounce();
        VFX.addSparks(b.x, b.y, '#4fc3f7', 3, 1, 0);
      }
      if (b.y - b.r < 0) {
        b.y = b.r; b.vy = Math.abs(b.vy);
        SFX.wallBounce();
        VFX.addSparks(b.x, b.y, '#4fc3f7', 3, 0, -1);
      }

      // Ball lost
      if (b.y + b.r >= H) {
        ballLost = true;
        break;
      }

      // Paddle collision
      if (
        b.vy > 0 &&
        b.y + b.r >= paddle.y - paddle.h / 2 &&
        b.x >= paddle.x - paddle.w / 2 &&
        b.x <= paddle.x + paddle.w / 2
      ) {
        const rel = (b.x - paddle.x) / (paddle.w / 2);
        const angle = rel * (Math.PI / 3);
        const speed = Math.hypot(b.vx, b.vy);
        b.vx = Math.sin(angle) * speed;
        b.vy = -Math.abs(Math.cos(angle) * speed);
        b.y = paddle.y - paddle.h / 2 - b.r;
        combo = 0;
        SFX.paddleHit();
        VFX.paddleFlash();
        VFX.addSparks(b.x, paddle.y - paddle.h / 2, '#4fc3f7', 4, rel, -1);
        break;
      }

      // Brick collisions — her adımda en fazla 1 tuğla (fire-ball aktifse sınır yok)
      const fireBallActive = !!activePowerups['fire-ball'];
      if (!brickHitThisFrame || fireBallActive) {
        for (const brick of bricks) {
          if (!brick.alive) continue;
          if (fireBallActive ? ballBrickOverlap(b, brick) : ballBrickCollide(b, brick)) {
            if (!fireBallActive) brickHitThisFrame = true; // fire-ball'da sınır yok
            // fire-ball: tek vuruşta yok et
            brick.hp = fireBallActive ? 0 : brick.hp - 1;
            // fire-ball aktifken hp zaten 0 yapıldı, normal modda 1 azaltıldı
            brick.shake = 5;
            combo++;
            comboTimer = 2.5;

            const basePts = brick.maxHp > 1 ? 150 : 100;
            const comboMult = Math.pow(1.15, combo - 1);
            const rawPts = basePts * comboMult;
            const pts = Math.round(rawPts / 10) * 10;
            score += pts;
            updateHUD();

            showScorePop(brick.x, brick.y, pts, combo);
            showCombo(combo, pts);

            const brickCx = brick.x + brick.w / 2;
            const brickCy = brick.y + brick.h / 2;
            const bColor = COLORS[brick.color].fill;

            if (brick.hp <= 0) {
              brick.alive = false;
              SFX.brickBreak(combo);
              VFX.addShockwave(brickCx, brickCy, bColor, brick.w * 1.4);
              VFX.addDebris(brick.x, brick.y, brick.w, brick.h, bColor);
              VFX.addSparks(brickCx, brickCy, bColor, 8, b.vx, b.vy);
              VFX.flash(bColor, 0.07, 100);
              VFX.shake(combo >= 5 ? 4 : 2, 140);
              if (brick.powerup) dropPowerup(brick);
              if (brick.bomb) explodeBomb(brick);
              spawnParticles(brickCx, brickCy, bColor, 5);
            } else {
              SFX.brickHit(combo);
              VFX.addSparks(brickCx, brickCy, bColor, 4, b.vx, b.vy);
              VFX.addShockwave(brickCx, brickCy, bColor, brick.w * 0.7);
            }

            SFX.comboTick(combo);
            if (!fireBallActive) break; // fire-ball: durma, önüne gelen her tuğlayı kır
          }
        }
      }
    }

    if (ballLost) {
      if (balls.length === 1) {
        lives--;
        updateHUD();
        SFX.lifeLost();
        VFX.shake(12, 500);
        VFX.flash('#ff0044', 0.3, 400);
        if (lives <= 0) {
          endGame();
          return;
        }
        // Tüm ek topları temizle ve sadece 1 topla yeniden başla
        balls = [];
        ballLaunched = false;
        balls.push(createBall(paddle.x, paddle.y - paddle.h / 2 - BALL_R, 0, 0));
        return;
      } else {
        ballsToRemove.push(i);
      }
    }
  }

  // Remove lost balls
  for (let i = ballsToRemove.length - 1; i >= 0; i--) {
    balls.splice(ballsToRemove[i], 1);
  }

  // Brick shake
  for (const b of bricks) { if (b.shake > 0) b.shake--; }

  // Power-ups falling
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    p.y += 2.5;
    if (
      p.y + 10 >= paddle.y - paddle.h / 2 &&
      p.y - 10 <= paddle.y + paddle.h / 2 &&
      p.x >= paddle.x - paddle.w / 2 &&
      p.x <= paddle.x + paddle.w / 2
    ) {
      applyPowerup(p.type);
      SFX.powerupCollect(p.type);
      VFX.flash('#ffd54f', 0.15, 180);
      VFX.addShockwave(p.x, p.y, '#ffd54f', 45);
      spawnParticles(p.x, p.y, '#ffd54f', 6);
      powerups.splice(i, 1);
    } else if (p.y > H + 20) {
      powerups.splice(i, 1);
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    if (p.isStar) {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 200 * dt;
    } else {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.12;
    }
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Check win
  if (bricks.every(b => !b.alive)) {
    levelWin();
  }
}

function ballBrickOverlap(b, brick) {
  const nx = clamp(b.x, brick.x, brick.x + brick.w);
  const ny = clamp(b.y, brick.y, brick.y + brick.h);
  return Math.hypot(b.x - nx, b.y - ny) < b.r;
}

function ballBrickCollide(b, brick) {
  const nx = clamp(b.x, brick.x, brick.x + brick.w);
  const ny = clamp(b.y, brick.y, brick.y + brick.h);
  const dist = Math.hypot(b.x - nx, b.y - ny);
  if (dist < b.r) {
    // Determine bounce direction
    const overlapX = b.x - nx;
    const overlapY = b.y - ny;
    if (Math.abs(overlapX) > Math.abs(overlapY)) {
      b.vx = overlapX > 0 ? Math.abs(b.vx) : -Math.abs(b.vx);
    } else {
      b.vy = overlapY > 0 ? Math.abs(b.vy) : -Math.abs(b.vy);
    }
    return true;
  }
  return false;
}

function dropPowerup(brick) {
  powerups.push({ x: brick.x + brick.w / 2, y: brick.y + brick.h / 2, type: brick.powerup });
}

function explodeBomb(sourceBrick) {
  const cx = sourceBrick.x + sourceBrick.w / 2;
  const cy = sourceBrick.y + sourceBrick.h / 2;
  const { bw, bh, gap } = getBrickDims();
  const tolerance = (bw + gap) * 0.6;

  // + şeklinde: aynı satır (yatay) ve aynı sütun (dikey)
  for (const brick of bricks) {
    if (!brick.alive || brick === sourceBrick) continue;
    const bx = brick.x + brick.w / 2;
    const by = brick.y + brick.h / 2;
    const sameRow = Math.abs(by - cy) < tolerance;
    const sameCol = Math.abs(bx - cx) < tolerance;
    if (sameRow || sameCol) {
      brick.alive = false;
      const bc = COLORS[brick.color].fill;
      VFX.addShockwave(bx, by, bc, brick.w * 1.8);
      VFX.addDebris(brick.x, brick.y, brick.w, brick.h, bc);
      VFX.addSparks(bx, by, bc, 6, 0, 0);
      spawnParticles(bx, by, '#ff6600', 4);
      spawnParticles(bx, by, bc, 3);
      score += 120;
      // Zincirleme bomba: patlayan tuğlada da bomba varsa o da patlar
      if (brick.bomb) {
        setTimeout(() => explodeBomb(brick), 80);
      }
    }
  }

  // Büyük patlama efekti bomba merkezine
  VFX.flash('#ff6600', 0.45, 320);
  VFX.shake(10, 400);
  VFX.addShockwave(cx, cy, '#ff6600', 120);
  VFX.addShockwave(cx, cy, '#ffcc00', 80);
  spawnParticles(cx, cy, '#ff6600', 20);
  spawnParticles(cx, cy, '#ffcc00', 12);
  spawnParticles(cx, cy, '#ffffff', 8);
  SFX.bombExplosion();
  updateHUD();
}

function applyPowerup(type) {
  if (type === 'extra-life') {
    if (lives >= 3) return; // Zaten max can varsa kalp işe yaramaz
    lives = Math.min(lives + 1, 3);
    updateHUD();
  } else if (type === 'wide-paddle') {
    paddle.w = paddle.baseW * 1.7;
    activePowerups['wide-paddle'] = 8;
  } else if (type === 'slow-ball') {
    for (const b of balls) {
      const speed = Math.hypot(b.vx, b.vy);
      const factor = 0.65;
      b.vx *= factor;
      b.vy *= factor;
      b._origSpeed = speed; // save original speed
    }
    activePowerups['slow-ball'] = 5;
  } else if (type === 'multi-ball') {
    const source = balls[0];
    if (source) {
      let svx = source.vx;
      let svy = source.vy;
      // Eğer top henüz fırlatılmamışsa (vx=0, vy=0), varsayılan bir hız ver
      if (svx === 0 && svy === 0) {
        const defaultSpeed = getBallSpeed();
        svx = 0;
        svy = -defaultSpeed;
      }
      balls.push(createBall(source.x, source.y, -Math.abs(svx) - Math.abs(svy) * 0.4, svy));
      balls.push(createBall(source.x, source.y,  Math.abs(svx) + Math.abs(svy) * 0.4, svy * 0.9));
    }
  }
}

// ---- DRAW ----
function draw() {
  // Bir resize/adres-çubuğu geçişi sırasında W/H henüz geçerli değilse,
  // bozuk/devasa şekiller çizmek yerine bu frame'i atla.
  if (!(W > 0) || !(H > 0)) return;

  ctx.clearRect(0, 0, W, H);

  ctx.save();
  VFX.applyShake(ctx);

  // Background grid (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  const gridSize = 40;
  for (let x = 0; x < W; x += gridSize) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += gridSize) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Bricks
  for (const brick of bricks) {
    if (!brick.alive) continue;
    const col = COLORS[brick.color];
    const sx = brick.shake > 0 ? (Math.random() - 0.5) * 3 : 0;
    const sy = brick.shake > 0 ? (Math.random() - 0.5) * 2 : 0;
    drawBrick(brick.x + sx, brick.y + sy, brick.w, brick.h, col.fill, col.glow, brick.hp, brick.maxHp, brick.powerup, brick.bomb);
  }

  // Power-ups falling
  for (const p of powerups) {
    drawPowerupToken(p.x, p.y, p.type);
  }

  // Debris chunks
  VFX.drawDebris(ctx);

  // Sparks
  VFX.drawSparks(ctx);

  // Shockwaves
  VFX.drawShockwaves(ctx);

  // Particles (legacy system — star bursts etc)
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = p.life * 0.9;
    ctx.fillStyle = p.color;
    if (p.isStar) {
      ctx.translate(p.x, p.y);
      ctx.beginPath();
      for (let s = 0; s < 5; s++) {
        const outer = p.size;
        const inner = p.size * 0.4;
        const aOuter = (s * Math.PI * 2) / 5 - Math.PI / 2;
        const aInner = aOuter + Math.PI / 5;
        if (s === 0) ctx.moveTo(Math.cos(aOuter) * outer, Math.sin(aOuter) * outer);
        else ctx.lineTo(Math.cos(aOuter) * outer, Math.sin(aOuter) * outer);
        ctx.lineTo(Math.cos(aInner) * inner, Math.sin(aInner) * inner);
      }
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // Paddle (with glow flash on hit)
  drawPaddle();

  // Balls
  for (const b of balls) {
    drawBall(b);
  }

  // Launch hint
  if (!ballLaunched) {
    ctx.save();
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(Date.now() * 0.004);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.round(W * 0.033)}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillText(T.launchHint, W / 2, H - 20);
    ctx.restore();
  }

  ctx.restore(); // end shake transform

  // Flash overlay (outside shake so it covers full screen)
  VFX.drawFlash(ctx, W, H);
}

function drawBrick(x, y, w, h, fill, glow, hp, maxHp, powerup, bomb) {
  const r = 6;
  ctx.save();

  // Background — bomba tuğlası koyu gri/siyah ton
  const baseFill = bomb ? '#1a1a1a' : (hp < maxHp ? shadeColor(fill, -0.3) : fill);
  ctx.fillStyle = baseFill;
  roundRect(ctx, x, y, w, h, r);
  ctx.fill();

  // Inner border glow
  ctx.globalAlpha = 0.55;
  ctx.strokeStyle = bomb ? '#ff4400' : fill;
  ctx.lineWidth = bomb ? 2 : 1.5;
  roundRect(ctx, x + 1, y + 1, w - 2, h - 2, r - 1);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Crack overlay for damaged bricks
  if (hp < maxHp) {
    ctx.globalAlpha = 0.38;
    ctx.fillStyle = '#000';
    roundRect(ctx, x + 2, y + 2, w - 4, h - 4, r - 2);
    ctx.fill();
    ctx.globalAlpha = 0.5;
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + w * 0.3, y + 2);
    ctx.lineTo(x + w * 0.55, y + h * 0.6);
    ctx.lineTo(x + w * 0.75, y + h - 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Top shine
  ctx.globalAlpha = bomb ? 0.08 : 0.22;
  const shine = ctx.createLinearGradient(x, y, x, y + h * 0.5);
  shine.addColorStop(0, '#fff');
  shine.addColorStop(1, 'transparent');
  ctx.fillStyle = shine;
  roundRect(ctx, x, y, w, h * 0.5, r);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Bomba ikonu — titreyen ateş efekti
  if (bomb) {
    const pulse = 0.85 + 0.15 * Math.sin(Date.now() / 200);
    ctx.globalAlpha = pulse;
    ctx.font = `bold ${Math.round(h * 0.7)}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ff4400';
    ctx.fillText('💣', x + w / 2, y + h / 2);
    ctx.globalAlpha = 1;
  } else if (powerup) {
    // Power-up icon
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.font = `bold ${Math.round(h * 0.65)}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const icons = { 'extra-life': '♥', 'wide-paddle': '⬛', 'slow-ball': '❄', 'multi-ball': '✦', 'fire-ball': '🔥' };
    ctx.fillText(icons[powerup] || '✦', x + w / 2, y + h / 2);
  }

  ctx.restore();
}

function drawPaddle() {
  const { x, y, w, h } = paddle;
  ctx.save();

  const glowT = VFX.getPaddleGlow();
  const isWide = activePowerups['wide-paddle'];
  const baseColor = isWide ? '#ffd54f' : '#4fc3f7';
  const baseColor2 = isWide ? '#ff8f00' : '#0288d1';

  const grad = ctx.createLinearGradient(x - w / 2, y - h / 2, x + w / 2, y + h / 2);
  grad.addColorStop(0, glowT > 0.1 ? `rgba(255,255,255,${0.5 + glowT * 0.5})` : baseColor);
  grad.addColorStop(1, baseColor2);
  ctx.fillStyle = grad;
  roundRect(ctx, x - w / 2, y - h / 2, w, h, 6);
  ctx.fill();

  // Outer border glow (shadow yerine)
  ctx.globalAlpha = 0.5 + glowT * 0.5;
  ctx.strokeStyle = glowT > 0.1 ? '#ffffff' : baseColor;
  ctx.lineWidth = 1.5 + glowT * 2;
  roundRect(ctx, x - w / 2, y - h / 2, w, h, 6);
  ctx.stroke();

  // Shine
  ctx.globalAlpha = 0.28 + glowT * 0.18;
  ctx.fillStyle = '#fff';
  roundRect(ctx, x - w / 2 + 2, y - h / 2 + 1, w - 4, h / 2, 4);
  ctx.fill();
  ctx.restore();
}

function drawBall(b) {
  ctx.save();
  const isFire = !!activePowerups['fire-ball'];
  if (isFire) {
    // Dış ateş halkası
    ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#ff6d00';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r + 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = '#ffff00';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r + 9, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    const grad = ctx.createRadialGradient(b.x - 2, b.y - 2, 1, b.x, b.y, b.r);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.3, '#ffeb3b');
    grad.addColorStop(0.7, '#ff6d00');
    grad.addColorStop(1, '#b71c1c');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Normal top
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#f06292';
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r + 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    const grad = ctx.createRadialGradient(b.x - 2, b.y - 2, 1, b.x, b.y, b.r);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(0.4, '#f06292');
    grad.addColorStop(1, '#880e4f');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawPowerupToken(x, y, type) {
  const icons = { 'extra-life': '♥', 'wide-paddle': '⬛', 'slow-ball': '❄', 'multi-ball': '✦', 'fire-ball': '🔥' };
  const colors = { 'extra-life': '#f06292', 'wide-paddle': '#ffd54f', 'slow-ball': '#4fc3f7', 'multi-ball': '#ce93d8', 'fire-ball': '#ff6d00' };
  const c = colors[type];
  ctx.save();
  // Halo yerine yarı saydam daire
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = c;
  ctx.beginPath();
  ctx.arc(x, y, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.fillStyle = c;
  ctx.font = 'bold 18px system-ui';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(icons[type] || '✦', x, y);
  ctx.restore();
}

// ---- PARTICLES ----
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1,
      size: 2 + Math.random() * 3,
      color,
      life: 0.6 + Math.random() * 0.4,
    });
  }
}

// ---- COMBO ----
function showCombo(c, pts) {
  if (c < 2) return;
  const el = document.getElementById('comboDisplay');
  const stars = c >= 10 ? '🌟🌟🌟' : c >= 7 ? '⭐⭐⭐' : c >= 5 ? '⭐⭐' : c >= 3 ? '⭐' : '';
  el.querySelector('.combo-label').textContent = `${c}× KOMBO ${stars}`;
  el.querySelector('.combo-pts').textContent = `+${pts.toLocaleString()}`;
  el.style.opacity = '1';
  clearTimeout(el._timer);
  el._timer = setTimeout(() => { el.style.opacity = '0'; }, 1400);

  // Yıldız parçacıkları
  if (c >= 3) spawnStarParticles(c);
}

function showScorePop(x, y, pts, combo) {
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = `+${pts}`;
  if (combo >= 10) { pop.style.color = '#ff6b6b'; pop.style.fontSize = '24px'; }
  else if (combo >= 5) { pop.style.color = '#ce93d8'; }
  const rect = canvas.getBoundingClientRect();
  pop.style.left = (rect.left + x - 20) + 'px';
  pop.style.top  = (rect.top  + y - 10) + 'px';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 900);
}

function spawnStarParticles(combo) {
  const count = combo >= 10 ? 20 : combo >= 5 ? 12 : 6;
  const cx = W / 2;
  const cy = H * 0.35;
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = 60 + Math.random() * 120;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 40,
      size: 4 + Math.random() * 4,
      color: ['#ffd54f','#ff6b6b','#ce93d8','#69f0ae','#4fc3f7'][Math.floor(Math.random()*5)],
      life: 0.7 + Math.random() * 0.5,
      isStar: true,
    });
  }
}

function hideCombo() {
  document.getElementById('comboDisplay').style.opacity = '0';
}

// ---- HUD ----
function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score.toLocaleString();
  document.getElementById('levelDisplay').textContent = level;

  const livesEl = document.getElementById('livesDisplay');
  livesEl.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const dot = document.createElement('div');
    dot.className = 'life-dot' + (i >= lives ? ' lost' : '');
    livesEl.appendChild(dot);
  }
}

// ---- SCREENS ----
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + 'Screen').classList.add('active');
}

function showOverlay(name) {
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
  document.getElementById(name + 'Overlay').classList.add('active');
}

function hideOverlays() {
  document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
}

// ---- GAME EVENTS ----
function levelWin() {
  gameState = 'win';
  SFX.levelWin();
  VFX.flash('#69f0ae', 0.25, 600);
  setLevelScore(level, score);

  const isLastLevel = level >= MAX_LEVELS;

  if (isLastLevel) {
    localStorage.setItem('neonBreaker_save', JSON.stringify({ level: 1, score: 0, lives: 3 }));
    document.getElementById('winTitle').textContent = '🏆 TEBRİKLER! OYUN TAMAMLANDI!';
    document.getElementById('btnNextLevel').style.display = 'none';
  } else {
    const nextLevel = level + 1;
    localStorage.setItem('neonBreaker_save', JSON.stringify({ level: nextLevel, score: 0, lives: 3 }));
    document.getElementById('winTitle').textContent = 'SEVİYE ' + level + ' TAMAMLANDI! 🎉';
    document.getElementById('btnNextLevel').style.display = '';
  }

  const best = getLevelScore(level);
  const isRecord = score > best;
  if (isRecord) setLevelScore(level, score);
  document.getElementById('winScore').textContent = score.toLocaleString();
  document.getElementById('winBest').textContent = Math.max(score, best).toLocaleString();
  document.getElementById('newRecordWin').style.display = isRecord ? 'block' : 'none';
  showOverlay('win');
}

function endGame() {
  gameState = 'gameover';
  SFX.gameOver();
  VFX.shake(16, 700);
  // Aynı leveldan 3 canla yeniden başlayabilsin
  localStorage.setItem('neonBreaker_save', JSON.stringify({ level, score: 0, lives: 3 }));
  // bestLevel'ı her zaman güncelle (skor rekoru olmasa bile ulaşılan level kaydedilsin)
  const bl = parseInt(localStorage.getItem('neonBreaker_bestLevel') || '1');
  if (level > bl) localStorage.setItem('neonBreaker_bestLevel', level);
  const best = getLevelScore(level);
  const isRecord = score > best;
  if (isRecord) setLevelScore(level, score);
  document.getElementById('goScore').textContent = score.toLocaleString();
  document.getElementById('goBest').textContent = Math.max(score, best).toLocaleString();
  document.getElementById('newRecordGO').style.display = isRecord ? 'block' : 'none';
  showOverlay('gameOver');
}

function getBest() {
  return parseInt(localStorage.getItem('neonBreaker_best') || '0');
}
function setBest(v) {
  localStorage.setItem('neonBreaker_best', v);
  const bl = parseInt(localStorage.getItem('neonBreaker_bestLevel') || '1');
  if (level > bl) localStorage.setItem('neonBreaker_bestLevel', level);
}

// ---- LOOP ----
let lastTime = 0;
function loop(ts) {
  const dt = Math.min(Math.max((ts - lastTime) / 1000, 0), 0.05);
  lastTime = ts;
  update(dt);
  draw();
  animId = requestAnimationFrame(loop);
}

// loop()'u (yeniden) başlatmak için tek giriş noktası. lastTime'ı her
// seferinde sıfırlar, böylece bir önceki oturumdan kalan büyük bir
// timestamp ile yeni session'ın ts=0 (veya küçük) başlangıcı arasında
// kocaman NEGATİF bir dt oluşmaz. Negatif/aşırı dt, paddleFlashT ve diğer
// tüm VFX/fizik state'lerinin bir anda devasa/bozuk değerlere sıçramasına
// yol açıyordu (paddle'ın tam beyaz kalması, ekranı kaplayan devasa
// şekiller vb).
function startLoop() {
  if (animId) cancelAnimationFrame(animId);
  lastTime = 0;
  animId = requestAnimationFrame((ts) => { lastTime = ts; animId = requestAnimationFrame(loop); });
}

// ---- INPUT ----
function handlePointer(clientX) {
  const rect = canvas.getBoundingClientRect();
  const x = clientX - rect.left;
  paddleTarget = clamp(x, paddle.w / 2, W - paddle.w / 2);
  touchX = x;
}

canvas.addEventListener('mousemove', e => {
  SFX.boot();
  if (gameState === 'playing') handlePointer(e.clientX);
});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  SFX.boot();
  if (gameState === 'playing') handlePointer(e.touches[0].clientX);
}, { passive: false });

canvas.addEventListener('click', e => {
  if (gameState === 'playing') {
    handlePointer(e.clientX);
    launchBall();
  }
});

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (gameState === 'playing') {
    handlePointer(e.touches[0].clientX);
    launchBall();
  }
}, { passive: false });

// Oyun ekranındayken overscroll glow'u engelle; menü ekranında scroll serbest.
document.addEventListener('touchmove', e => {
  if (gameState === 'playing' || gameState === 'paused') {
    e.preventDefault();
  }
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { launchBall(); }
  if (e.code === 'Escape' || e.code === 'KeyP') { togglePause(); }
  if (e.code === 'ArrowLeft') paddleTarget -= W * 0.05;
  if (e.code === 'ArrowRight') paddleTarget += W * 0.05;
});

function togglePause() {
  if (gameState === 'playing') {
    gameState = 'paused';
    showOverlay('pause');
  } else if (gameState === 'paused') {
    gameState = 'playing';
    hideOverlays();
  }
}

// Menüye dönerken ortak yol. animId durdurulmazsa loop() arka planda
// çalışmaya devam eder; update(dt) 'playing' dışı durumlarda hep erken
// çıktığı için fiziksel bir soruna yol açmaz, ama draw() her frame
// çağrılmaya devam eder ve bir sonraki level'a paddleFlash/shake/flash
// gibi VFX state'lerini donmuş haliyle taşır. Döngüyü tamamen durdurmak
// bunu kökten engeller.
function goToMenu() {
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  gameState = 'menu';
  hideOverlays();
  showScreen('menu');
  updateMenuStats();
}

// Custom confirm modal
const confirmModal = document.getElementById('confirmModal');
const modalCancel  = document.getElementById('modalCancel');
const modalConfirm = document.getElementById('modalConfirm');
const modalBackdrop = document.getElementById('modalBackdrop');

function showConfirmModal(onConfirm) {
  confirmModal.classList.add('active');
  const wasPaused = gameState === 'paused';
  if (gameState === 'playing') { gameState = 'paused'; }

  function close(confirmed) {
    confirmModal.classList.remove('active');
    modalCancel.removeEventListener('click', onNo);
    modalConfirm.removeEventListener('click', onYes);
    modalBackdrop.removeEventListener('click', onNo);
    if (!confirmed && !wasPaused) { gameState = 'playing'; }
  }
  function onYes() { close(true); onConfirm(); }
  function onNo()  { close(false); }

  modalConfirm.addEventListener('click', onYes);
  modalCancel.addEventListener('click', onNo);
  modalBackdrop.addEventListener('click', onNo);
}

document.getElementById('btnHome').addEventListener('click', () => {
  if (gameState === 'playing' || gameState === 'paused') {
    showConfirmModal(() => { goToMenu(); });
  }
});

document.getElementById('btnMenuFromPause').addEventListener('click', () => {
  goToMenu();
});

document.getElementById('btnNextLevel').addEventListener('click', () => {
  level++;
  initLevel();
  hideOverlays();
  updateHUD();
  saveProgress();
  gameState = 'playing';
});

document.getElementById('btnRestart').addEventListener('click', () => {
  hideOverlays();
  // startGame() yerine mevcut leveli 3 canla yeniden başlat
  score = 0;
  lives = 3;
  showScreen('game');
  requestAnimationFrame(() => {
    resize();
    initLevel();
    updateHUD();
    gameState = 'playing';
    startLoop();
  });
});

});

// ---- LEVEL SCORES ----
const MAX_LEVELS = 15;

function getLevelScore(lvl) {
  return parseInt(localStorage.getItem(`neonBreaker_lvl_${lvl}`) || '0');
}

function setLevelScore(lvl, s) {
  const prev = getLevelScore(lvl);
  if (s > prev) localStorage.setItem(`neonBreaker_lvl_${lvl}`, s);
}

function getUnlockedUpTo() {
  // highest level ever reached
  return parseInt(localStorage.getItem('neonBreaker_bestLevel') || '1');
}

function starsForScore(lvl, s) {
  if (s <= 0) return 0;
  // Tuğla sayısı level başına artar, buna göre eşik hesapla
  const brickRows = 4 + Math.floor(lvl * 0.8);
  const brickCount = brickRows * 7; // COLS = 7
  const avgPerBrick = 100;
  const fullClear = brickCount * avgPerBrick;
  if (s >= fullClear * 1.5) return 3; // kombo bonusuyla üst skor
  if (s >= fullClear * 0.8) return 2;
  return 1; // sadece bitirdi
}

function buildLevelMap() {
  const el = document.getElementById('levelMap');
  el.innerHTML = '';
  const save = loadProgress();
  const currentLvl = save ? save.level : 1;
  const unlockedUpTo = Math.max(getUnlockedUpTo(), currentLvl);

  for (let i = 1; i <= MAX_LEVELS; i++) {
    const card = document.createElement('div');
    const sc = getLevelScore(i);
    const stars = starsForScore(i, sc);
    const isLocked = i > unlockedUpTo;
    const isCurrent = i === currentLvl;
    const isCompleted = sc > 0 && i < currentLvl;

    card.className = 'level-card ' + (isLocked ? 'locked' : isCurrent ? 'current' : isCompleted ? 'completed' : 'unlocked');

    const starStr = stars > 0 ? ('⭐'.repeat(stars) + '☆'.repeat(3 - stars)) : '☆☆☆';

    card.innerHTML = `
      <div class="lc-num">${i}</div>
      <div class="lc-label">${isCurrent ? T.lcContinue : isLocked ? T.lcLocked : T.lcLevel}</div>
      <div class="lc-stars">${isLocked ? '' : starStr}</div>
      <div class="lc-score">${sc > 0 ? sc.toLocaleString() : (isLocked ? '' : '—')}</div>
    `;

    if (!isLocked) {
      card.addEventListener('click', () => {
        SFX.uiClick();
        const s = loadProgress();
        // Start from this level with saved lives/score if it's the current level, else fresh
        if (s && i === s.level) {
          continueGame();
        } else {
          score = 0;
          level = i;
          lives = 3;
          showScreen('game');
          requestAnimationFrame(() => {
            resize();
            initLevel();
            updateHUD();
            gameState = 'playing';
            startLoop();
          });
        }
      });
    }

    el.appendChild(card);
  }
}

function updateMenuStats() {
  buildLevelMap();
}

// ---- UTILS ----
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

function shadeColor(hex, amount) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = clamp(((num >> 16) & 0xFF) + amount * 255, 0, 255);
  const g = clamp(((num >> 8) & 0xFF) + amount * 255, 0, 255);
  const b = clamp((num & 0xFF) + amount * 255, 0, 255);
  return `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
}

function roundRect(ctx, x, y, w, h, r) {
  // Negatif/aşırı küçük w veya h, kontrol noktalarının ters dönmesine ve
  // ekranı kaplayan bozuk, aşırı büyük eğrilere yol açabilir — önce normalize et.
  if (w < 0) { x += w; w = -w; }
  if (h < 0) { y += h; h = -h; }
  r = Math.max(0, Math.min(r, w / 2, h / 2));
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ---- INIT ----
window.addEventListener('resize', () => {
  resize();
});

// Mobil Chrome'da adres çubuğu gösterilip/gizlenirken window.innerHeight
// her zaman güvenilir bir 'resize' olayı tetiklemez; visualViewport
// olayları paddle'ın görünür alanın dışında/altında kalmasını önler.
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => resize());
  window.visualViewport.addEventListener('scroll', () => resize());
}

updateMenuStats();
resize();
</script>
